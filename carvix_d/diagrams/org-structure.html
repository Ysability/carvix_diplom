<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Организационная структура — Транспортное подразделение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #1a237e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .header p {
            color: #546e7a;
            font-size: 15px;
        }
        .diagram-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            padding: 40px;
            max-width: 1400px;
            width: 100%;
            overflow-x: auto;
        }
        svg {
            width: 100%;
            min-width: 1200px;
            height: auto;
            display: block;
        }
        .node-rect {
            rx: 12;
            ry: 12;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .node-rect:hover {
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.25));
            transform: translateY(-2px);
        }
        .node-text {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }
        .node-subtext {
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            fill: rgba(255,255,255,0.85);
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }
        .dept-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            font-weight: 700;
            fill: #37474f;
            text-anchor: middle;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #455a64;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .download-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: white;
            box-shadow: 0 4px 12px rgba(21,101,192,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(21,101,192,0.45);
        }
        .btn-secondary {
            background: #eceff1;
            color: #37474f;
        }
        .btn-secondary:hover {
            background: #cfd8dc;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Организационная структура транспортного подразделения</h1>
        <p>Автоматизированная система управления автопарком «Carvix»</p>
    </div>

    <div class="diagram-wrapper">
        <svg viewBox="0 0 1320 900" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradients -->
                <linearGradient id="grad-dir" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#1a237e"/>
                    <stop offset="100%" stop-color="#283593"/>
                </linearGradient>
                <linearGradient id="grad-chief" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#0d47a1"/>
                    <stop offset="100%" stop-color="#1565c0"/>
                </linearGradient>
                <linearGradient id="grad-analyst" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00695c"/>
                    <stop offset="100%" stop-color="#00897b"/>
                </linearGradient>
                <linearGradient id="grad-disp" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#e65100"/>
                    <stop offset="100%" stop-color="#f57c00"/>
                </linearGradient>
                <linearGradient id="grad-mech" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#c62828"/>
                    <stop offset="100%" stop-color="#d32f2f"/>
                </linearGradient>
                <linearGradient id="grad-user" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#6a1b9a"/>
                    <stop offset="100%" stop-color="#7b1fa2"/>
                </linearGradient>
                <linearGradient id="grad-dept" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#455a64"/>
                    <stop offset="100%" stop-color="#546e7a"/>
                </linearGradient>
                <linearGradient id="grad-fleet" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2e7d32"/>
                    <stop offset="100%" stop-color="#388e3c"/>
                </linearGradient>

                <!-- Arrow marker -->
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#90a4ae"/>
                </marker>

                <!-- Glow filter -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Background grid -->
            <rect width="1320" height="900" fill="#fafbfc" rx="12"/>

            <!-- Department groups background -->
            <rect x="20" y="320" width="410" height="560" fill="#e3f2fd" stroke="#bbdefb" stroke-width="1" stroke-dasharray="8 4" rx="16" opacity="0.5"/>
            <rect x="450" y="320" width="410" height="560" fill="#fce4ec" stroke="#f8bbd0" stroke-width="1" stroke-dasharray="8 4" rx="16" opacity="0.5"/>
            <rect x="880" y="320" width="420" height="560" fill="#f3e5f5" stroke="#e1bee7" stroke-width="1" stroke-dasharray="8 4" rx="16" opacity="0.5"/>

            <!-- Department labels -->
            <text x="225" y="350" class="dept-label">РЕМОНТНЫЙ ЦЕХ</text>
            <text x="655" y="350" class="dept-label">ДИСПЕТЧЕРСКАЯ СЛУЖБА</text>
            <text x="1090" y="350" class="dept-label">АВТОПАРК / ПОЛЬЗОВАТЕЛИ</text>

            <!-- ===== LINES ===== -->
            <!-- Director to Chief Mechanic -->
            <line x1="660" y1="125" x2="330" y2="220" stroke="#90a4ae" stroke-width="2" marker-end="url(#arrow)"/>
            <!-- Director to Analyst -->
            <line x1="660" y1="125" x2="990" y2="220" stroke="#90a4ae" stroke-width="2" marker-end="url(#arrow)"/>

            <!-- Chief Mechanic to Mechanics -->
            <line x1="330" y1="290" x2="110" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="330" y1="290" x2="330" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="330" y1="290" x2="225" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>

            <!-- Chief Mechanic to Dispatchers -->
            <line x1="330" y1="290" x2="550" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="330" y1="290" x2="655" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="330" y1="290" x2="760" y2="380" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>

            <!-- Dispatcher to Users -->
            <line x1="655" y1="450" x2="990" y2="530" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="655" y1="450" x2="1090" y2="530" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>
            <line x1="655" y1="450" x2="1190" y2="530" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>

            <!-- Mechanic to Vehicle/Repair flow -->
            <line x1="110" y1="520" x2="110" y2="620" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5 3"/>
            <line x1="225" y1="520" x2="225" y2="620" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5 3"/>
            <line x1="330" y1="520" x2="330" y2="620" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5 3"/>

            <!-- ===== NODES ===== -->
            <!-- Level 1: Director -->
            <rect x="510" y="50" width="300" height="75" class="node-rect" fill="url(#grad-dir)"/>
            <text x="660" y="75" class="node-text" font-size="18" fill="white">ДИРЕКТОР</text>
            <text x="660" y="98" class="node-subtext">Руководитель предприятия</text>

            <!-- Level 2: Chief Mechanic -->
            <rect x="180" y="220" width="300" height="70" class="node-rect" fill="url(#grad-chief)"/>
            <text x="330" y="242" class="node-text" font-size="16" fill="white">ГЛАВНЫЙ МЕХАНИК</text>
            <text x="330" y="262" class="node-subtext">Руководитель ремонтного цеха</text>
            <text x="330" y="278" class="node-subtext" font-size="10" fill="rgba(255,255,255,0.6)">Финансы | Ремонты | Назначения</text>

            <!-- Level 2: Analyst -->
            <rect x="840" y="220" width="300" height="70" class="node-rect" fill="url(#grad-analyst)"/>
            <text x="990" y="242" class="node-text" font-size="16" fill="white">АНАЛИТИК</text>
            <text x="990" y="262" class="node-subtext">Финансовый аналитик</text>
            <text x="990" y="278" class="node-subtext" font-size="10" fill="rgba(255,255,255,0.6)">Отчёты | Бюджеты | Прогнозы</text>

            <!-- Level 3: Mechanics (3 persons) -->
            <rect x="30" y="380" width="160" height="140" class="node-rect" fill="url(#grad-mech)"/>
            <text x="110" y="405" class="node-text" font-size="14" fill="white">МЕХАНИК №1</text>
            <text x="110" y="422" class="node-subtext" font-size="10">Старший механик</text>
            <text x="110" y="445" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Старт / завершение ремонта</text>
            <text x="110" y="460" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Фиксация стоимости</text>
            <text x="110" y="475" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Учёт запчастей</text>
            <text x="110" y="490" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Гарантийный срок</text>
            <text x="110" y="508" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">Загрузка: 3 ремонта</text>

            <rect x="200" y="380" width="160" height="140" class="node-rect" fill="url(#grad-mech)"/>
            <text x="280" y="405" class="node-text" font-size="14" fill="white">МЕХАНИК №2</text>
            <text x="280" y="422" class="node-subtext" font-size="10">Механик</text>
            <text x="280" y="445" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Старт / завершение ремонта</text>
            <text x="280" y="460" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Фиксация стоимости</text>
            <text x="280" y="475" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Учёт запчастей</text>
            <text x="280" y="490" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Гарантийный срок</text>
            <text x="280" y="508" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">Загрузка: 1 ремонт</text>

            <rect x="370" y="380" width="160" height="140" class="node-rect" fill="url(#grad-mech)"/>
            <text x="450" y="405" class="node-text" font-size="14" fill="white">МЕХАНИК №3</text>
            <text x="450" y="422" class="node-subtext" font-size="10">Механик</text>
            <text x="450" y="445" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Старт / завершение ремонта</text>
            <text x="450" y="460" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Фиксация стоимости</text>
            <text x="450" y="475" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Учёт запчастей</text>
            <text x="450" y="490" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Гарантийный срок</text>
            <text x="450" y="508" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">Загрузка: 5 ремонтов</text>

            <!-- Level 3: Dispatchers (3 persons) -->
            <rect x="540" y="380" width="160" height="70" class="node-rect" fill="url(#grad-disp)"/>
            <text x="620" y="405" class="node-text" font-size="13" fill="white">ДИСПЕТЧЕР №1</text>
            <text x="620" y="422" class="node-subtext" font-size="10">Распределение заявок</text>
            <text x="620" y="438" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">Автонаводка | Ручное назначение</text>

            <rect x="710" y="380" width="160" height="70" class="node-rect" fill="url(#grad-disp)"/>
            <text x="790" y="405" class="node-text" font-size="13" fill="white">ДИСПЕТЧЕР №2</text>
            <text x="790" y="422" class="node-subtext" font-size="10">Контроль статусов</text>
            <text x="790" y="438" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">Изменение статусов | Таймлайн</text>

            <rect x="880" y="380" width="160" height="70" class="node-rect" fill="url(#grad-disp)"/>
            <text x="960" y="405" class="node-text" font-size="13" fill="white">ДИСПЕТЧЕР №3</text>
            <text x="960" y="422" class="node-subtext" font-size="10">Оператор смены</text>
            <text x="960" y="438" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">Приём заявок | Чат</text>

            <!-- Level 4: Users (3 groups) -->
            <rect x="910" y="530" width="160" height="110" class="node-rect" fill="url(#grad-user)"/>
            <text x="990" y="555" class="node-text" font-size="13" fill="white">ПОЛЬЗОВАТЕЛЬ №1</text>
            <text x="990" y="572" class="node-subtext" font-size="10">Автопарк №1</text>
            <text x="990" y="590" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Создание заявок на ремонт</text>
            <text x="990" y="605" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Просмотр статусов</text>
            <text x="990" y="620" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Управление своими ТС</text>
            <text x="990" y="635" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">ТС: 2 единицы</text>

            <rect x="1010" y="530" width="160" height="110" class="node-rect" fill="url(#grad-user)"/>
            <text x="1090" y="555" class="node-text" font-size="13" fill="white">ПОЛЬЗОВАТЕЛЬ №2</text>
            <text x="1090" y="572" class="node-subtext" font-size="10">Автопарк №2</text>
            <text x="1090" y="590" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Создание заявок на ремонт</text>
            <text x="1090" y="605" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Просмотр статусов</text>
            <text x="1090" y="620" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Управление своими ТС</text>
            <text x="1090" y="635" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">ТС: 1 единица</text>

            <rect x="1110" y="530" width="160" height="110" class="node-rect" fill="url(#grad-user)"/>
            <text x="1190" y="555" class="node-text" font-size="13" fill="white">ПОЛЬЗОВАТЕЛЬ №3</text>
            <text x="1190" y="572" class="node-subtext" font-size="10">Главное управление</text>
            <text x="1190" y="590" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Создание заявок на ремонт</text>
            <text x="1190" y="605" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Просмотр статусов</text>
            <text x="1190" y="620" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.7)">• Управление своими ТС</text>
            <text x="1190" y="635" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.5)">ТС: 3 единицы</text>

            <!-- Level 5: Vehicle / Repair flow boxes -->
            <rect x="30" y="620" width="160" height="80" class="node-rect" fill="url(#grad-fleet)" opacity="0.9"/>
            <text x="110" y="645" class="node-text" font-size="12" fill="white">ТРАНСПОРТНЫЕ</text>
            <text x="110" y="662" class="node-text" font-size="12" fill="white">СРЕДСТВА</text>
            <text x="110" y="680" class="node-subtext" font-size="10">Ремонт → Обслуживание</text>
            <text x="110" y="694" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">12 единиц в автопарке</text>

            <rect x="200" y="620" width="160" height="80" class="node-rect" fill="url(#grad-dept)" opacity="0.9"/>
            <text x="280" y="645" class="node-text" font-size="12" fill="white">СКЛАД</text>
            <text x="280" y="662" class="node-text" font-size="12" fill="white">ЗАПЧАСТЕЙ</text>
            <text x="280" y="680" class="node-subtext" font-size="10">Учёт остатков</text>
            <text x="280" y="694" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">Приходные накладные</text>

            <rect x="370" y="620" width="160" height="80" class="node-rect" fill="url(#grad-dept)" opacity="0.9"/>
            <text x="450" y="645" class="node-text" font-size="12" fill="white">ПОСТАВЩИКИ</text>
            <text x="450" y="662" class="node-text" font-size="12" fill="white">ЗАПЧАСТЕЙ</text>
            <text x="450" y="680" class="node-subtext" font-size="10">Справочник</text>
            <text x="450" y="694" class="node-subtext" font-size="9" fill="rgba(255,255,255,0.6)">Контакты, адреса</text>

            <!-- Bottom info flow -->
            <rect x="540" y="620" width="500" height="80" class="node-rect" fill="url(#grad-dir)" opacity="0.95"/>
            <text x="790" y="645" class="node-text" font-size="14" fill="white">АВТОМАТИЗИРОВАННАЯ СИСТЕМА «CARVIX»</text>
            <text x="790" y="665" class="node-subtext" font-size="11">Управление заявками → Распределение → Ремонт → Учёт затрат → Аналитика</text>
            <text x="790" y="685" class="node-subtext" font-size="10" fill="rgba(255,255,255,0.7)">База данных: PostgreSQL | Backend: Node.js + Express | Frontend: Vanilla JS</text>

            <!-- Side info panel -->
            <rect x="30" y="740" width="1260" height="130" class="node-rect" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="12"/>
            <text x="660" y="770" class="node-text" font-size="16" fill="#1a237e">ПОТОКИ ДАННЫХ В СИСТЕМЕ</text>
            <text x="660" y="795" class="node-subtext" font-size="11" fill="#546e7a">1. Пользователь создаёт заявку → Система регистрирует заявку в статусе «Новая»</text>
            <text x="660" y="812" class="node-subtext" font-size="11" fill="#546e7a">2. Диспетчер выполняет автонаводку или назначает механика вручную → Заявка → «В работе»</text>
            <text x="660" y="829" class="node-subtext" font-size="11" fill="#546e7a">3. Механик выполняет ремонт и фиксирует стоимость работ, запчастей и гарантийный срок</text>
            <text x="660" y="846" class="node-subtext" font-size="11" fill="#546e7a">4. Система обновляет статус заявки → «Выполнено», записывает аудит, обновляет бюджеты и TCO</text>
            <text x="660" y="863" class="node-subtext" font-size="11" fill="#546e7a">5. Аналитик формирует отчёты (план/факт, TCO, прогноз Holt-Winters) для принятия управленческих решений</text>
        </svg>
    </div>

    <div class="legend">

        <div class="legend-item">
            <div class="legend-color" style="background: linear-gradient(135deg, #0d47a1, #1565c0);"></div>
            <span>Главный механик</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: linear-gradient(135deg, #00695c, #00897b);"></div>

        <div class="legend-item">
            <div class="legend-color" style="background: linear-gradient(135deg, #e65100, #f57c00);"></div>

    <div class="download-bar">
        <button class="btn btn-primary" onclick="downloadSVG()">⬇ Скачать SVG</button>
        <button class="btn btn-secondary" onclick="downloadPNG()">⬇ Скачать PNG</button>
    </div>

    <script>
        function downloadSVG() {
            const svg = document.querySelector('svg');
            const serializer = new XMLSerializer();
            const source = serializer.serializeToString(svg);
            const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'org-structure-carvix.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function downloadPNG() {
            const svg = document.querySelector('svg');
            const serializer = new XMLSerializer();
            const source = serializer.serializeToString(svg);
            const canvas = document.createElement('canvas');
            canvas.width = 2640;
            canvas.height = 1800;
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const svgBlob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            img.onload = function() {
                ctx.drawImage(img, 0, 0, 2640, 1800);
                const pngUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = pngUrl;
                link.download = 'org-structure-carvix.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }
    </script>
